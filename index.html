<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栗頭ランナー</title>
  <style>
    :root {
      --ink: #101424;
      --paper: rgba(255, 255, 255, 0.82);
      --paper-strong: rgba(255, 255, 255, 0.9);
      --accent: #3656ff;
      --accent-strong: #c126d8;
      --soft: #dff3ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", Arial, sans-serif;
      line-height: 1.6;
      color: var(--ink);
      background: #101424;
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: -20%;
      z-index: 0;
      content: "";
      background:
        radial-gradient(circle at 12% 22%, rgba(255, 82, 122, 0.92), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(73, 126, 255, 0.9), transparent 28%),
        radial-gradient(circle at 72% 78%, rgba(62, 225, 157, 0.86), transparent 32%),
        radial-gradient(circle at 18% 82%, rgba(255, 199, 87, 0.9), transparent 31%),
        conic-gradient(from 120deg, #171f66, #c126d8, #ff5b77, #29c9c1, #3656ff, #171f66);
      background-size: 120% 120%, 115% 115%, 130% 130%, 125% 125%, 100% 100%;
      filter: saturate(1.2);
      animation: color-drift 18s ease-in-out infinite alternate;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: 0;
      content: "";
      background:
        linear-gradient(120deg, rgba(16, 20, 36, 0.62), rgba(16, 20, 36, 0.08) 48%, rgba(16, 20, 36, 0.5)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 96px);
      pointer-events: none;
    }

    header,
    main,
    footer {
      position: relative;
      z-index: 2;
    }

    .runner-stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .giant-chestnut {
      position: absolute;
      top: -180px;
      right: min(4vw, 54px);
      width: min(78vw, 820px);
      aspect-ratio: 1;
      opacity: 0.24;
      filter: drop-shadow(0 24px 48px rgba(16, 20, 36, 0.34));
      transform: rotate(8deg);
    }

    .giant-chestnut-shell {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 78%, rgba(246, 224, 176, 0.98) 0 23%, transparent 24%),
        linear-gradient(145deg, #7a3f1d 0%, #be7436 48%, #3f1c0d 100%);
      clip-path: polygon(50% 0, 95% 29%, 89% 78%, 50% 100%, 11% 78%, 5% 29%);
    }

    .giant-eye,
    .giant-mouth {
      position: absolute;
      background: #21110a;
    }

    .giant-eye {
      top: 44%;
      width: 8%;
      height: 11%;
      border-radius: 50%;
    }

    .giant-eye-left {
      left: 34%;
    }

    .giant-eye-right {
      right: 34%;
    }

    .giant-mouth {
      left: 42%;
      top: 62%;
      width: 16%;
      height: 7%;
      border-bottom: min(1vw, 8px) solid #21110a;
      border-radius: 0 0 999px 999px;
      background: transparent;
    }

    .wall {
      position: absolute;
      bottom: 34px;
      width: 12px;
      height: 92px;
      border-radius: 8px;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.95) 0 10px,
          rgba(255, 210, 94, 0.95) 10px 20px
        );
      box-shadow: 0 8px 24px rgba(16, 20, 36, 0.28);
      opacity: 0.82;
    }

    .wall-left {
      left: 10px;
    }

    .wall-right {
      right: 10px;
    }

    .runner {
      position: absolute;
      left: 0;
      bottom: 28px;
      width: 112px;
      height: 168px;
      transform: translate3d(24px, 0, 0);
      transform-origin: center bottom;
      will-change: transform;
    }

    .runner-body {
      position: absolute;
      left: 31px;
      bottom: 43px;
      width: 50px;
      height: 58px;
      border-radius: 21px 21px 14px 14px;
      background:
        radial-gradient(circle at 28% 28%, rgba(255, 247, 226, 0.8) 0 12px, transparent 13px),
        radial-gradient(circle at 72% 28%, rgba(255, 247, 226, 0.8) 0 12px, transparent 13px),
        linear-gradient(160deg, #f1c18b 0%, #d87e54 62%, #8c3f2d 100%);
      box-shadow:
        inset -8px -7px 0 rgba(92, 42, 32, 0.22),
        inset 0 -26px 0 rgba(101, 48, 37, 0.16);
    }

    .runner-body::before,
    .runner-body::after {
      position: absolute;
      top: 8px;
      width: 26px;
      height: 20px;
      content: "";
      border-radius: 999px;
      background: linear-gradient(160deg, #f9d3a6, #c06041);
      box-shadow: inset -4px -3px 0 rgba(82, 36, 28, 0.18);
    }

    .runner-body::before {
      left: -14px;
      transform: rotate(-18deg);
    }

    .runner-body::after {
      right: -14px;
      transform: rotate(18deg);
    }

    .runner-abs {
      position: absolute;
      left: 18px;
      top: 25px;
      width: 15px;
      height: 27px;
      border-top: 2px solid rgba(75, 34, 24, 0.45);
      border-bottom: 2px solid rgba(75, 34, 24, 0.45);
    }

    .runner-abs::before {
      position: absolute;
      left: 6px;
      top: -2px;
      width: 2px;
      height: 31px;
      content: "";
      background: rgba(75, 34, 24, 0.38);
    }

    .runner-head {
      position: absolute;
      left: 17px;
      bottom: 99px;
      width: 78px;
      height: 72px;
      border-radius: 52% 52% 44% 44%;
      background:
        radial-gradient(circle at 51% 83%, #f6e0b0 0 20px, transparent 21px),
        linear-gradient(145deg, #7a3f1d 0%, #b66b2f 48%, #4b2413 100%);
      box-shadow: inset -9px -8px 0 rgba(48, 20, 10, 0.18), 0 5px 18px rgba(16, 20, 36, 0.24);
      clip-path: polygon(50% 0, 93% 30%, 90% 76%, 50% 100%, 10% 76%, 7% 30%);
    }

    .runner-eye {
      position: absolute;
      top: 34px;
      width: 8px;
      height: 10px;
      border-radius: 50%;
      background: #22140e;
    }

    .runner-eye-left {
      left: 25px;
    }

    .runner-eye-right {
      right: 25px;
    }

    .runner-mouth {
      position: absolute;
      left: 34px;
      top: 50px;
      width: 12px;
      height: 7px;
      border-bottom: 3px solid #22140e;
      border-radius: 0 0 999px 999px;
      transition: transform 0.2s ease, border-radius 0.2s ease, height 0.2s ease;
    }

    .runner-tear {
      position: absolute;
      top: 44px;
      width: 5px;
      height: 12px;
      border-radius: 50% 50% 60% 60%;
      background: #66d7ff;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .runner-tear-left {
      left: 23px;
    }

    .runner-tear-right {
      right: 23px;
    }

    .runner[data-face="happy"] .runner-mouth {
      height: 9px;
      border-bottom-width: 4px;
    }

    .runner[data-face="cry"] .runner-eye {
      height: 4px;
      border-radius: 999px;
    }

    .runner[data-face="cry"] .runner-mouth {
      width: 13px;
      height: 12px;
      border: 3px solid #22140e;
      border-bottom-width: 3px;
      border-radius: 50%;
      transform: translateY(0);
    }

    .runner[data-face="cry"] .runner-tear {
      opacity: 1;
      transform: translateY(2px);
    }

    .runner[data-face="angry"] .runner-eye {
      height: 6px;
      border-radius: 2px;
    }

    .runner[data-face="angry"] .runner-eye-left {
      transform: rotate(18deg);
    }

    .runner[data-face="angry"] .runner-eye-right {
      transform: rotate(-18deg);
    }

    .runner[data-face="angry"] .runner-mouth {
      border-top: 3px solid #22140e;
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      transform: translateY(5px);
    }

    .runner-arm,
    .runner-leg {
      position: absolute;
      transform-origin: top center;
    }

    .runner-arm {
      bottom: 76px;
      width: 42px;
      height: 48px;
      animation: arm-drive 0.36s ease-in-out infinite alternate;
    }

    .runner-arm-left {
      left: 2px;
    }

    .runner-arm-right {
      right: 2px;
      animation-delay: -0.18s;
    }

    .runner-leg {
      bottom: 0;
      width: 37px;
      height: 49px;
      animation: leg-drive 0.32s ease-in-out infinite alternate;
    }

    .runner-leg-left {
      left: 28px;
    }

    .runner-leg-right {
      right: 28px;
      animation-delay: -0.16s;
    }

    .limb-upper,
    .limb-lower,
    .runner-fist,
    .runner-foot {
      position: absolute;
      display: block;
      background: #5a2d1b;
      box-shadow: inset -3px -3px 0 rgba(20, 9, 6, 0.22);
    }

    .limb-upper,
    .limb-lower {
      width: 11px;
      border-radius: 999px;
      transform-origin: top center;
    }

    .runner-arm .limb-upper {
      top: 0;
      left: 16px;
      height: 28px;
      transform: rotate(34deg);
    }

    .runner-arm .limb-lower {
      top: 22px;
      left: 25px;
      height: 30px;
      transform: rotate(-68deg);
      animation: forearm-pump 0.36s ease-in-out infinite alternate;
    }

    .runner-arm-right .limb-lower {
      animation-delay: -0.18s;
    }

    .runner-fist {
      top: 43px;
      left: 11px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .runner-leg .limb-upper {
      top: 0;
      left: 13px;
      height: 30px;
      transform: rotate(-34deg);
    }

    .runner-leg .limb-lower {
      top: 25px;
      left: 2px;
      height: 31px;
      transform: rotate(72deg);
      animation: shin-kick 0.32s ease-in-out infinite alternate;
    }

    .runner-leg-right .limb-lower {
      animation-delay: -0.16s;
    }

    .runner-foot {
      top: 47px;
      left: 22px;
      width: 22px;
      height: 9px;
      border-radius: 999px;
    }

    @keyframes arm-drive {
      from {
        transform: rotate(-36deg) translateY(3px);
      }

      to {
        transform: rotate(42deg) translateY(-2px);
      }
    }

    @keyframes forearm-pump {
      from {
        transform: rotate(-86deg);
      }

      to {
        transform: rotate(-34deg);
      }
    }

    @keyframes leg-drive {
      from {
        transform: rotate(38deg) translateY(-2px);
      }

      to {
        transform: rotate(-44deg) translateY(3px);
      }
    }

    @keyframes shin-kick {
      from {
        transform: rotate(86deg);
      }

      to {
        transform: rotate(34deg);
      }
    }

    @keyframes color-drift {
      0% {
        transform: translate3d(-4%, -2%, 0) scale(1.05) rotate(0deg);
        background-position: 0% 20%, 90% 10%, 72% 88%, 16% 74%, center;
      }

      50% {
        transform: translate3d(3%, 2%, 0) scale(1.12) rotate(7deg);
        background-position: 28% 54%, 68% 32%, 42% 74%, 30% 24%, center;
      }

      100% {
        transform: translate3d(5%, -3%, 0) scale(1.08) rotate(-5deg);
        background-position: 62% 16%, 38% 58%, 86% 34%, 12% 42%, center;
      }
    }

    header {
      min-height: 76vh;
      display: flex;
      align-items: center;
      padding: 72px 24px 96px;
      color: #fff;
    }

    .hero {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--soft);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 4px 22px rgba(0, 0, 0, 0.45);
    }

    header p {
      max-width: 560px;
      margin: 24px 0 0;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.42);
    }

    main {
      max-width: 920px;
      margin: -44px auto 0;
      padding: 0 20px 44px;
    }

    .content {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    section {
      padding: 26px;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(16, 20, 36, 0.28);
      backdrop-filter: blur(16px);
    }

    h2 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 1.25rem;
    }

    section p {
      margin: 0;
    }

    .feature {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      align-items: center;
      background: var(--paper-strong);
    }

    .color-note {
      display: grid;
      gap: 10px;
      padding: 22px;
      color: #fff;
      background: linear-gradient(135deg, #3656ff, #c126d8 48%, #ff7b54);
      border-radius: 8px;
    }

    .color-note strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .color-note span {
      color: rgba(255, 255, 255, 0.84);
    }

    h2,
    p {
      margin-top: 0;
    }

    footer {
      padding: 24px 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.38);
    }

    @media (prefers-reduced-motion: reduce) {
      body::before {
        animation: none;
      }

      .runner-arm,
      .runner-leg,
      .runner-arm .limb-lower,
      .runner-leg .limb-lower {
        animation: none;
      }
    }

    @media (max-width: 720px) {
      header {
        min-height: 70vh;
        padding: 56px 18px 88px;
      }

      main {
        margin-top: -40px;
        padding-inline: 16px;
      }

      .content,
      .feature {
        grid-template-columns: 1fr;
      }

      section {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="runner-stage" aria-hidden="true">
    <div class="giant-chestnut">
      <div class="giant-chestnut-shell"></div>
      <span class="giant-eye giant-eye-left"></span>
      <span class="giant-eye giant-eye-right"></span>
      <span class="giant-mouth"></span>
    </div>
    <div class="wall wall-left"></div>
    <div class="wall wall-right"></div>
    <div class="runner" id="runner" data-face="happy">
      <div class="runner-head">
        <span class="runner-eye runner-eye-left"></span>
        <span class="runner-eye runner-eye-right"></span>
        <span class="runner-mouth"></span>
        <span class="runner-tear runner-tear-left"></span>
        <span class="runner-tear runner-tear-right"></span>
      </div>
      <div class="runner-body">
        <span class="runner-abs"></span>
      </div>
      <div class="runner-arm runner-arm-left">
        <span class="limb-upper"></span>
        <span class="limb-lower"></span>
        <span class="runner-fist"></span>
      </div>
      <div class="runner-arm runner-arm-right">
        <span class="limb-upper"></span>
        <span class="limb-lower"></span>
        <span class="runner-fist"></span>
      </div>
      <div class="runner-leg runner-leg-left">
        <span class="limb-upper"></span>
        <span class="limb-lower"></span>
        <span class="runner-foot"></span>
      </div>
      <div class="runner-leg runner-leg-right">
        <span class="limb-upper"></span>
        <span class="limb-lower"></span>
        <span class="runner-foot"></span>
      </div>
    </div>
  </div>

  <header>
    <div class="hero">
      <p class="eyebrow">Animated Color Background</p>
      <h1>栗頭ランナー</h1>
      <p>巨大なムキムキ栗頭人形が、壁に当たるたびに向きを変えて全力疾走し、ときどき画面上まで大ジャンプします。</p>
    </div>
  </header>

  <main>
    <div class="content">
      <section class="feature">
        <div>
          <h2>壁で反転</h2>
          <p>画面の左右にある壁へ近づくと、栗頭の人形が向きを変えて反対側へ走っていきます。</p>
        </div>
        <div class="color-note">
          <strong>MAX</strong>
          <span>巨大化した体で、腕と足を曲げ伸ばししながら走っているようにしました。</span>
        </div>
      </section>

      <section>
        <h2>大ジャンプ</h2>
        <p>走っている途中でランダムに画面の上の方まで跳び上がるので、動きに勢いがあります。</p>
      </section>

      <section>
        <h2>表情変化</h2>
        <p>顔は笑ったり、泣いたり、怒ったりするように切り替わります。背景にも栗の顔を大きく入れています。</p>
      </section>
    </div>
  </main>

  <footer>
    <small>&copy; 2026 栗頭ランナー</small>
  </footer>

  <script>
    const runner = document.getElementById("runner");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

    if (runner && !reduceMotion.matches) {
      const state = {
        x: 24,
        y: 0,
        direction: 1,
        velocityY: 0,
        lastTime: performance.now(),
        nextJumpAt: performance.now() + 1200 + Math.random() * 1800
      };

      const faces = ["happy", "cry", "angry"];
      let faceIndex = 0;

      const runnerBaseWidth = 112;
      const runnerBaseHeight = 168;
      const runnerScale = 1.75;
      const runnerWidth = runnerBaseWidth * runnerScale;
      const runnerHeight = runnerBaseHeight * runnerScale;
      const scaleOffset = (runnerWidth - runnerBaseWidth) / 2;
      const sidePadding = 16;
      const speed = 205;
      const gravity = 2400;

      function minX() {
        return sidePadding + scaleOffset;
      }

      function maxX() {
        return Math.max(minX(), window.innerWidth - runnerBaseWidth - sidePadding - scaleOffset);
      }

      function jumpPower() {
        const targetHeight = Math.max(360, window.innerHeight - runnerHeight - 36);
        return Math.sqrt(2 * gravity * targetHeight);
      }

      function jump(now) {
        if (state.y === 0) {
          state.velocityY = jumpPower();
          state.nextJumpAt = now + 1100 + Math.random() * 2300;
        }
      }

      function changeFace() {
        faceIndex = (faceIndex + 1) % faces.length;
        runner.dataset.face = faces[faceIndex];
      }

      setInterval(changeFace, 1800);

      function animate(now) {
        const delta = Math.min((now - state.lastTime) / 1000, 0.035);
        state.lastTime = now;

        state.x += state.direction * speed * delta;

        if (state.x >= maxX()) {
          state.x = maxX();
          state.direction = -1;
        } else if (state.x <= minX()) {
          state.x = minX();
          state.direction = 1;
        }

        if (now >= state.nextJumpAt) {
          jump(now);
        }

        if (state.y > 0 || state.velocityY > 0) {
          state.velocityY -= gravity * delta;
          state.y += state.velocityY * delta;

          if (state.y <= 0) {
            state.y = 0;
            state.velocityY = 0;
          }
        }

        runner.style.transform = `translate3d(${state.x}px, ${-state.y}px, 0) scale(${runnerScale}) scaleX(${state.direction})`;
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
