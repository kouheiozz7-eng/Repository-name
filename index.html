<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栗頭ランナー</title>
  <style>
    :root {
      --ink: #101424;
      --paper: rgba(255, 255, 255, 0.82);
      --paper-strong: rgba(255, 255, 255, 0.9);
      --accent: #3656ff;
      --accent-strong: #c126d8;
      --soft: #dff3ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", Arial, sans-serif;
      line-height: 1.6;
      color: var(--ink);
      background: #101424;
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: -20%;
      z-index: 0;
      content: "";
      background:
        radial-gradient(circle at 12% 22%, rgba(255, 82, 122, 0.92), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(73, 126, 255, 0.9), transparent 28%),
        radial-gradient(circle at 72% 78%, rgba(62, 225, 157, 0.86), transparent 32%),
        radial-gradient(circle at 18% 82%, rgba(255, 199, 87, 0.9), transparent 31%),
        conic-gradient(from 120deg, #171f66, #c126d8, #ff5b77, #29c9c1, #3656ff, #171f66);
      background-size: 120% 120%, 115% 115%, 130% 130%, 125% 125%, 100% 100%;
      filter: saturate(1.2);
      animation: color-drift 18s ease-in-out infinite alternate;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: 0;
      content: "";
      background:
        linear-gradient(120deg, rgba(16, 20, 36, 0.62), rgba(16, 20, 36, 0.08) 48%, rgba(16, 20, 36, 0.5)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 96px);
      pointer-events: none;
    }

    header,
    main,
    footer {
      position: relative;
      z-index: 2;
    }

    .runner-stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .wall {
      position: absolute;
      bottom: 34px;
      width: 12px;
      height: 92px;
      border-radius: 8px;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.95) 0 10px,
          rgba(255, 210, 94, 0.95) 10px 20px
        );
      box-shadow: 0 8px 24px rgba(16, 20, 36, 0.28);
      opacity: 0.82;
    }

    .wall-left {
      left: 10px;
    }

    .wall-right {
      right: 10px;
    }

    .runner {
      position: absolute;
      left: 0;
      bottom: 36px;
      width: 76px;
      height: 120px;
      transform: translate3d(24px, 0, 0);
      transform-origin: center bottom;
      will-change: transform;
    }

    .runner-body {
      position: absolute;
      left: 20px;
      bottom: 24px;
      width: 36px;
      height: 42px;
      border-radius: 18px 18px 12px 12px;
      background: linear-gradient(160deg, #f7efe0, #d87e54 74%);
      box-shadow: inset -7px -5px 0 rgba(132, 60, 40, 0.17);
    }

    .runner-head {
      position: absolute;
      left: 8px;
      bottom: 62px;
      width: 60px;
      height: 58px;
      border-radius: 52% 52% 44% 44%;
      background:
        radial-gradient(circle at 51% 83%, #f6e0b0 0 15px, transparent 16px),
        linear-gradient(145deg, #7a3f1d 0%, #b66b2f 48%, #4b2413 100%);
      box-shadow: inset -9px -8px 0 rgba(48, 20, 10, 0.18), 0 5px 18px rgba(16, 20, 36, 0.24);
      clip-path: polygon(50% 0, 93% 30%, 90% 76%, 50% 100%, 10% 76%, 7% 30%);
    }

    .runner-head::before,
    .runner-head::after {
      position: absolute;
      top: 27px;
      width: 6px;
      height: 8px;
      content: "";
      border-radius: 50%;
      background: #22140e;
    }

    .runner-head::before {
      left: 19px;
    }

    .runner-head::after {
      right: 19px;
    }

    .runner-face {
      position: absolute;
      left: 28px;
      top: 39px;
      width: 7px;
      height: 4px;
      border-bottom: 2px solid #22140e;
      border-radius: 0 0 10px 10px;
    }

    .runner-arm,
    .runner-leg {
      position: absolute;
      background: #5a2d1b;
      transform-origin: top center;
    }

    .runner-arm {
      bottom: 53px;
      width: 7px;
      height: 31px;
      border-radius: 9px;
      animation: arm-swing 0.34s ease-in-out infinite alternate;
    }

    .runner-arm-left {
      left: 16px;
    }

    .runner-arm-right {
      right: 16px;
      animation-delay: -0.17s;
    }

    .runner-leg {
      bottom: 0;
      width: 8px;
      height: 30px;
      border-radius: 9px;
      animation: leg-sprint 0.3s ease-in-out infinite alternate;
    }

    .runner-leg-left {
      left: 27px;
    }

    .runner-leg-right {
      right: 27px;
      animation-delay: -0.15s;
    }

    @keyframes arm-swing {
      from {
        transform: rotate(-34deg);
      }

      to {
        transform: rotate(34deg);
      }
    }

    @keyframes leg-sprint {
      from {
        transform: rotate(30deg);
      }

      to {
        transform: rotate(-30deg);
      }
    }

    @keyframes color-drift {
      0% {
        transform: translate3d(-4%, -2%, 0) scale(1.05) rotate(0deg);
        background-position: 0% 20%, 90% 10%, 72% 88%, 16% 74%, center;
      }

      50% {
        transform: translate3d(3%, 2%, 0) scale(1.12) rotate(7deg);
        background-position: 28% 54%, 68% 32%, 42% 74%, 30% 24%, center;
      }

      100% {
        transform: translate3d(5%, -3%, 0) scale(1.08) rotate(-5deg);
        background-position: 62% 16%, 38% 58%, 86% 34%, 12% 42%, center;
      }
    }

    header {
      min-height: 76vh;
      display: flex;
      align-items: center;
      padding: 72px 24px 96px;
      color: #fff;
    }

    .hero {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--soft);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 4px 22px rgba(0, 0, 0, 0.45);
    }

    header p {
      max-width: 560px;
      margin: 24px 0 0;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.42);
    }

    main {
      max-width: 920px;
      margin: -44px auto 0;
      padding: 0 20px 44px;
    }

    .content {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    section {
      padding: 26px;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(16, 20, 36, 0.28);
      backdrop-filter: blur(16px);
    }

    h2 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 1.25rem;
    }

    section p {
      margin: 0;
    }

    .feature {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      align-items: center;
      background: var(--paper-strong);
    }

    .color-note {
      display: grid;
      gap: 10px;
      padding: 22px;
      color: #fff;
      background: linear-gradient(135deg, #3656ff, #c126d8 48%, #ff7b54);
      border-radius: 8px;
    }

    .color-note strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .color-note span {
      color: rgba(255, 255, 255, 0.84);
    }

    h2,
    p {
      margin-top: 0;
    }

    footer {
      padding: 24px 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.38);
    }

    @media (prefers-reduced-motion: reduce) {
      body::before {
        animation: none;
      }

      .runner-arm,
      .runner-leg {
        animation: none;
      }
    }

    @media (max-width: 720px) {
      header {
        min-height: 70vh;
        padding: 56px 18px 88px;
      }

      main {
        margin-top: -40px;
        padding-inline: 16px;
      }

      .content,
      .feature {
        grid-template-columns: 1fr;
      }

      section {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="runner-stage" aria-hidden="true">
    <div class="wall wall-left"></div>
    <div class="wall wall-right"></div>
    <div class="runner" id="runner">
      <div class="runner-head">
        <span class="runner-face"></span>
      </div>
      <div class="runner-body"></div>
      <div class="runner-arm runner-arm-left"></div>
      <div class="runner-arm runner-arm-right"></div>
      <div class="runner-leg runner-leg-left"></div>
      <div class="runner-leg runner-leg-right"></div>
    </div>
  </div>

  <header>
    <div class="hero">
      <p class="eyebrow">Animated Color Background</p>
      <h1>栗頭ランナー</h1>
      <p>栗の形をした頭の人形が、壁に当たるたびに向きを変えて走り、ときどき上にジャンプします。</p>
    </div>
  </header>

  <main>
    <div class="content">
      <section class="feature">
        <div>
          <h2>壁で反転</h2>
          <p>画面の左右にある壁へ近づくと、栗頭の人形が向きを変えて反対側へ走っていきます。</p>
        </div>
        <div class="color-note">
          <strong>RUN</strong>
          <span>足と腕を振りながら、左右をずっと往復するアニメーションです。</span>
        </div>
      </section>

      <section>
        <h2>たまにジャンプ</h2>
        <p>走っている途中でランダムに跳び上がるので、毎回少し違う動きに見えます。</p>
      </section>

      <section>
        <h2>栗の人形</h2>
        <p>頭は栗のとがった形にして、顔と小さな体をCSSだけで描いています。</p>
      </section>
    </div>
  </main>

  <footer>
    <small>&copy; 2026 栗頭ランナー</small>
  </footer>

  <script>
    const runner = document.getElementById("runner");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

    if (runner && !reduceMotion.matches) {
      const state = {
        x: 24,
        y: 0,
        direction: 1,
        velocityY: 0,
        lastTime: performance.now(),
        nextJumpAt: performance.now() + 1200 + Math.random() * 1800
      };

      const runnerWidth = 76;
      const sidePadding = 22;
      const speed = 155;
      const gravity = 1500;
      const jumpPower = 520;

      function maxX() {
        return Math.max(sidePadding, window.innerWidth - runnerWidth - sidePadding);
      }

      function jump(now) {
        if (state.y === 0) {
          state.velocityY = jumpPower;
          state.nextJumpAt = now + 1300 + Math.random() * 2600;
        }
      }

      function animate(now) {
        const delta = Math.min((now - state.lastTime) / 1000, 0.035);
        state.lastTime = now;

        state.x += state.direction * speed * delta;

        if (state.x >= maxX()) {
          state.x = maxX();
          state.direction = -1;
        } else if (state.x <= sidePadding) {
          state.x = sidePadding;
          state.direction = 1;
        }

        if (now >= state.nextJumpAt) {
          jump(now);
        }

        if (state.y > 0 || state.velocityY > 0) {
          state.velocityY -= gravity * delta;
          state.y += state.velocityY * delta;

          if (state.y <= 0) {
            state.y = 0;
            state.velocityY = 0;
          }
        }

        runner.style.transform = `translate3d(${state.x}px, ${-state.y}px, 0) scaleX(${state.direction})`;
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
