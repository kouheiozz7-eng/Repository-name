<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #222;
      background: #f7f7f7;
    }

    header {
      padding: 48px 20px;
      text-align: center;
      color: #fff;
      background: #2f6fed;
    }

    main {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 20px;
    }

    section {
      margin-bottom: 24px;
      padding: 24px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1,
    h2 {
      margin-top: 0;
    }

    footer {
      padding: 24px 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Website</h1>
    <p>GitHub Pagesで公開するシンプルなWebサイトです。</p>
  </header>

  <main>
    <section>
      <h2>About</h2>
      <p>ここに自己紹介やサイトの説明を書きます。</p>
    </section>

    <section>
      <h2>Contact</h2>
      <p>連絡先やSNSリンクをここに追加できます。</p>
    </section>
  </main>

  <footer>
    <small>&copy; 2026 My Website</small>
  </footer>
</body>
</html>
