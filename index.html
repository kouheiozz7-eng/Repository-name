<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tea Time</title>
  <style>
    :root {
      --ink: #15211b;
      --paper: rgba(255, 252, 241, 0.9);
      --paper-strong: rgba(255, 252, 241, 0.96);
      --leaf: #486b3f;
      --tea: #9a5e2e;
      --mint: #c7d7b5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", Arial, sans-serif;
      line-height: 1.6;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(9, 22, 18, 0.5), rgba(9, 22, 18, 0.08)),
        url("assets/tea-background.png") center / cover fixed;
    }

    header {
      min-height: 76vh;
      display: flex;
      align-items: center;
      padding: 72px 24px 96px;
      color: #fff;
    }

    .hero {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--mint);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 4px 22px rgba(0, 0, 0, 0.45);
    }

    header p {
      max-width: 560px;
      margin: 24px 0 0;
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.42);
    }

    main {
      max-width: 920px;
      margin: -44px auto 0;
      padding: 0 20px 44px;
    }

    .content {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    section {
      padding: 26px;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(11, 28, 20, 0.28);
      backdrop-filter: blur(10px);
    }

    h2 {
      margin: 0 0 10px;
      color: var(--leaf);
      font-size: 1.25rem;
    }

    section p {
      margin: 0;
    }

    .feature {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      align-items: center;
      background: var(--paper-strong);
    }

    .tea-note {
      display: grid;
      gap: 10px;
      padding: 22px;
      color: #fff;
      background: linear-gradient(135deg, #486b3f, #9a5e2e);
      border-radius: 8px;
    }

    .tea-note strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .tea-note span {
      color: rgba(255, 255, 255, 0.84);
    }

    h2,
    p {
      margin-top: 0;
    }

    footer {
      padding: 24px 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.38);
    }

    @media (max-width: 720px) {
      body {
        background-attachment: scroll;
      }

      header {
        min-height: 70vh;
        padding: 56px 18px 88px;
      }

      main {
        margin-top: -40px;
        padding-inline: 16px;
      }

      .content,
      .feature {
        grid-template-columns: 1fr;
      }

      section {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <p class="eyebrow">Green Tea & Slow Moments</p>
      <h1>Tea Time</h1>
      <p>湯気の立つ一杯と、静かな余白を感じるウェブサイトです。</p>
    </div>
  </header>

  <main>
    <div class="content">
      <section class="feature">
        <div>
          <h2>今日のお茶</h2>
          <p>香ばしさ、渋み、甘みのバランスを大切にした、落ち着いた時間のためのページです。</p>
        </div>
        <div class="tea-note">
          <strong>80℃</strong>
          <span>少し冷ましたお湯で、葉の香りをゆっくり開かせます。</span>
        </div>
      </section>

      <section>
        <h2>About</h2>
        <p>お茶の背景に合わせて、やわらかく読みやすいデザインにしました。</p>
      </section>

      <section>
        <h2>Contact</h2>
        <p>連絡先やSNSリンクをここに追加できます。</p>
      </section>
    </div>
  </main>

  <footer>
    <small>&copy; 2026 Tea Time</small>
  </footer>
</body>
</html>
